server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|mp4|webm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Favicon legado: HTML antigo pedia /app/vite.svg; ficheiro está na raiz do dist (public/vite.svg).
    location = /app/vite.svg {
        alias /usr/share/nginx/html/vite.svg;
        add_header Cache-Control "public, max-age=86400";
    }

    # HTML do SPA: sem cache longo — após deploy o browser deve buscar index novo (JS/CSS em /app/assets/ têm hash).
    location = /app/index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        alias /usr/share/nginx/html/app/index.html;
    }

    # SPA React (build em /app/)
    location /app/ {
        try_files $uri $uri/ /app/index.html;
    }
    location = /app {
        return 301 /app/;
    }

    # Atalhos para quem ainda acede /login sem o prefixo /app/
    location = /login {
        return 302 /app/login;
    }
    location = /cadastro {
        return 302 /app/cadastro;
    }

    # Landing estática na raiz + restantes ficheiros públicos
    location / {
        try_files $uri $uri/ /index.html;
    }
}

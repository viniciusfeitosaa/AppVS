# Deploy automático na VPS quando há push na branch principal.
#
# Secrets necessários no repositório GitHub (Settings → Secrets and variables → Actions):
#   VPS_HOST       — IP ou hostname da VPS (ex.: 203.0.113.10)
#   VPS_USER       — utilizador SSH (ex.: vivasaude)
#   VPS_SSH_KEY    — chave privada SSH (PEM) com acesso à VPS
#   VPS_APP_PATH   — caminho absoluto do clone do AppVS na VPS (ex.: /home/vivasaude/AppVS)
#
name: Deploy VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 40m
          script: |
            set -e
            cd "${{ secrets.VPS_APP_PATH }}"
            chmod +x scripts/deploy-vps.sh 2>/dev/null || true
            ./scripts/deploy-vps.sh
